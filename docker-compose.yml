services:
  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
